# Supabase project configuration for Anamata Kāhui.
#
# This file is read by `supabase init`, `supabase start`, `supabase db push`,
# and the Supabase dashboard when linking a local instance to a hosted project.
#
# A `project_id` is required to deploy migrations to a hosted Supabase project.
# Run `supabase link --project-ref <ref>` to set this automatically.

project_id = "anamatakahui"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://anamatakahui.co.nz", "https://www.anamatakahui.co.nz"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # Set true in production
secure_password_change = true
max_frequency = "1m0s"
otp_length = 6
otp_expiry = 3600

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false
